  /api/v1/attendance-policies:
    get:
      summary: List attendance policies
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Attendance policy list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttendancePolicy"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
    post:
      summary: Create an attendance policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendancePolicyRequest"
      responses:
        "201":
          description: Attendance policy created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendancePolicy"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/attendance-policies/{id}:
    get:
      summary: Get an attendance policy
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Attendance policy detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendancePolicy"
        "404":
