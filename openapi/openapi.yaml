    patch:
      summary: Update an attendance policy
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttendancePolicyRequest"
      responses:
        "200":
          description: Attendance policy updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendancePolicy"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Attendance policy not found
  /api/v1/closing-periods/{id}/close:
    post:
      summary: Close a closing period
      parameters:
        - $ref: "#/components/parameters/ClosingPeriodId"
      responses:
        "200":
          description: Closing period closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClosingPeriodResponse"
        "404":
          description: Closing period not found
components:
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              issues:
                type: object
  parameters:
    ResourceId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ApprovalRequestId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    WorkSessionId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ClosingPeriodId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateAttendanceLogRequest:
      type: object
      properties:
        siteId:
          type: string
          format: uuid
          nullable: true
        logType:
          type: string
          enum: [clock_in, clock_out, break_start, break_end]
        occurredAt:
          type: string
          format: date-time
        source:
          type: string
          enum: [manual, mobile, web, system]
        workSessionId:
          type: string
          format: uuid
          nullable: true
        metadata:
          type: object
          additionalProperties: true
      required: [logType, occurredAt]
    AttendanceLogResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/AttendanceLog"
    AttendanceLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        site_id:
          type: string
          format: uuid
          nullable: true
        log_type:
          type: string
        occurred_at:
          type: string
        source:
          type: string
        work_session_id:
          type: string
          format: uuid
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
        user_display_name:
          type: string
        user_employee_code:
          type: string
          nullable: true
        site_name:
          type: string
          nullable: true
        work_session_status:
          type: string
          nullable: true
        work_session_session_date:
          type: string
          nullable: true
    WorkSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
          nullable: true
        site_id:
          type: string
          format: uuid
          nullable: true
        work_category_id:
          type: string
          format: uuid
          nullable: true
        session_date:
          type: string
        started_at:
          type: string
        ended_at:
          type: string
          nullable: true
        status:
          type: string
        notes:
          type: string
          nullable: true
        approved_at:
          type: string
          nullable: true
        approved_by:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
        user_display_name:
          type: string
        user_employee_code:
          type: string
          nullable: true
        project_name:
          type: string
          nullable: true
        site_name:
          type: string
          nullable: true
        work_category_name:
          type: string
          nullable: true
        approved_by_name:
          type: string
          nullable: true
    WorkSessionListItem:
      allOf:
        - $ref: "#/components/schemas/WorkSession"
    WorkSessionDetail:
      allOf:
        - $ref: "#/components/schemas/WorkSession"
        - type: object
          properties:
            attendanceLogs:
              type: array
