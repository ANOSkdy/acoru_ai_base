openapi: 3.1.0
info:
  title: Acoru Business Platform Baseline API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/health/db:
    get:
      summary: Check database connectivity
      responses:
        "200":
          description: Database connection succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                      checkedAt:
                        type: string
                      database:
                        type: string
                      connectionSource:
                        type: string
                    required: [status, checkedAt, database, connectionSource]
  /api/v1/attendance/logs:
    get:
      summary: List attendance logs
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: logType
          schema:
            type: string
            enum: [clock_in, clock_out, break_start, break_end]
        - in: query
          name: siteId
          schema:
            type: string
            format: uuid
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Attendance log list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttendanceLog"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
    post:
      summary: Create an attendance log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendanceLogRequest"
      responses:
        "201":
          description: Attendance log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceLogResponse"
  /api/v1/attendance/logs/{id}:
    get:
      summary: Get an attendance log
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Attendance log detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceLog"
        "404":
          description: Attendance log not found
  /api/v1/work-sessions:
    get:
      summary: List work sessions
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, submitted, approved, rejected]
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: siteId
          schema:
            type: string
            format: uuid
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Work sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkSessionListItem"
                  meta:
                    type: object
                    properties:
                      limit:
                        type: integer
                      offset:
                        type: integer
  /api/v1/work-sessions/{id}:
    get:
      summary: Get a work session
      parameters:
        - $ref: "#/components/parameters/WorkSessionId"
      responses:
        "200":
          description: Work session detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/WorkSessionDetail"
        "404":
          description: Work session not found
    patch:
      summary: Update a work session
      parameters:
        - $ref: "#/components/parameters/WorkSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkSessionRequest"
      responses:
        "200":
          description: Work session updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/WorkSession"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Work session not found or already approved
  /api/v1/work-sessions/{id}/approve:
    post:
      summary: Approve a work session
      parameters:
        - $ref: "#/components/parameters/WorkSessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Work session approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                      approved_at:
                        type: string
                        nullable: true
                      approved_by:
                        type: string
                        nullable: true
        "404":
          description: Work session not found
  /api/v1/approvals:
    get:
      summary: List approval requests
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
        - in: query
          name: targetType
          schema:
            type: string
        - in: query
          name: requester
          schema:
            type: string
            format: uuid
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Approval request list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalRequestListItem"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
  /api/v1/approvals/{id}:
    get:
      summary: Get an approval request
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestId"
      responses:
        "200":
          description: Approval request detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ApprovalRequestDetail"
        "404":
          description: Approval request not found
  /api/v1/approvals/{id}/approve:
    post:
      summary: Approve an approval request
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewApprovalRequest"
      responses:
        "200":
          description: Approval request approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ApprovalRequest"
        "404":
          description: Approval request not found
        "409":
          description: Approval request is not pending
  /api/v1/approvals/{id}/reject:
    post:
      summary: Reject an approval request
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewApprovalRequest"
      responses:
        "200":
          description: Approval request rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ApprovalRequest"
        "404":
          description: Approval request not found
        "409":
          description: Approval request is not pending
  /api/v1/closing-periods:
    get:
      summary: List closing periods
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, closed]
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Closing period list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClosingPeriod"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
    post:
      summary: Create a closing period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClosingPeriodRequest"
      responses:
        "201":
          description: Closing period created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClosingPeriodResponse"
  /api/v1/closing-periods/{id}:
    get:
      summary: Get a closing period
      parameters:
        - $ref: "#/components/parameters/ClosingPeriodId"
      responses:
        "200":
          description: Closing period detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClosingPeriodResponse"
        "404":
          description: Closing period not found
  /api/v1/clients:
    get:
      summary: List clients
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [active, inactive]
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Client"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
    post:
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/clients/{id}:
    get:
      summary: Get a client
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Client"
        "404":
          description: Client not found
    patch:
      summary: Update a client
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Client not found
  /api/v1/projects:
    get:
      summary: List projects
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
